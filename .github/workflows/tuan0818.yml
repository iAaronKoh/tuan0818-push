name: 0818tuan Auto Push

on:
  schedule:
    - cron: '*/10 * * * *'   # 每30分钟运行一次（UTC时间）
    # - cron: '0 */3 * * *'   # 每3小时运行一次（更省额度）
  workflow_dispatch:         # 允许手动触发（方便测试）

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run push bot
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python tuan0818_bot.py
